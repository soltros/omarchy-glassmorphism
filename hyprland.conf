general {
    gaps_in = 8
    gaps_out = 15
    border_size = 2
    col.active_border = rgba(cba6f7aa) rgba(a485ffaa) 45deg
    col.inactive_border = rgba(595959aa)
}

decoration {
    rounding = 0

    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        ignore_opacity = true
        xray = false
        noise = 0.02
        contrast = 0.9
        brightness = 0.8
    }

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(00000080)
        color_inactive = rgba(00000040)
    }
    
    dim_inactive = false
    dim_strength = 0.2
}

animations {
    enabled = true

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# Window Opacity Rules
windowrule = opacity 0.85 0.85, match:class ^(thunar)$
windowrule = opacity 0.85 0.85, match:class ^(nemo)$
windowrule = opacity 0.85 0.85, match:class ^(dolphin)$
# Add terminals specific to Omarchy
windowrule = opacity 0.80 0.80, match:class ^(Alacritty|foot|com\.mitchellh\.ghostty)$

# Layer Rules for Blur
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = blur on, match:namespace walker
layerrule = ignore_alpha 0, match:namespace walker
layerrule = blur on, match:namespace mako
layerrule = ignore_alpha 0, match:namespace mako
layerrule = blur on, match:namespace swayosd
layerrule = ignore_alpha 0, match:namespace swayosd
